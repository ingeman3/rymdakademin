services:
  db:
    image: postgres:16-alpine
    container_name: rymdakademin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rymdakademin
      POSTGRES_USER: rymd_user
      POSTGRES_PASSWORD: rymd_password
    ports:
      - "5433:5432"
    volumes:
      - rymdakademin_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rymd_user -d rymdakademin"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: rymdakademin-app:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rymdakademin-app
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: rymdakademin
      DB_USER: rymd_user
      DB_PASSWORD: rymd_password
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  rymdakademin_data:
